<style>
  /* Purana CSS same rakha hai */
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; overflow:hidden; width:100%; height:100%; background:#0d0821;

  #hud { position:absolute; top:0; left:0; width:100%; padding:14px 18px; display:flex;

  .hud-panel { background:rgba(13,8,33,0.72); border:1px solid rgba(255,180,0,0.35); border-radius:12px;

  .cash { font-family:'Baloo 2',sans-serif; font-weight:800; color:#ffd166; font-size:22px; }
  .cash span { color:#8ee3c8; font-size:12px; display:block; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; }
  .lbl { font-size:12px; color:#cbb8ea; margin-top:4px; font-weight:700; }
  #missionBanner { position:absolute; top:14px; left:50%; transform:translateX(-50%);

  #missionBanner.show{ opacity:1; }
  #missionBanner .sub{ color:#8ee3c8; font-size:11px; }
  #toast { position:absolute; top:78px; left:50%; transform:translateX(-50%); color:#ffd166;

    opacity:0; pointer-events:none; transition:opacity .4s; z-index:3; }
  #toast.show{ opacity:1; }
  #hint { position:absolute; left:16px; bottom:14px; color:rgba(255,255,255,.55); font-size:12px; z-index:3; pointer-events:none; }
  #versionTag { position:absolute; right:14px; bottom:6px; color:rgba(255,255,255,.35); font-size:10px; z-index:3; pointer-events:none; }

  #minimapWrap { position:absolute; top:14px; left:50%; transform:translateX(-50%); z-index:3; text-align:center; pointer-events:none; }
  #minimap { border:2px solid rgba(255,180,0,.6); border-radius:10px; background:rgba(10,6,25,.75); box-shadow:0 0 18px rgba(255,180,0,.25); }
  #minimapLabel { color:#8ee3c8; font-size:10px; margin-top:3px; font-weight:700; letter-spacing:1px; }

  .healthwrap { width:140px; }
  .healthlabel { font-size:11px; color:#8ee3c8; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:3px; font-weight:700; }
  .healthbar-bg { width:100%; height:10px; background:rgba(255,255,255,.12); border-radius:6px; overflow:hidden; }
  .healthbar-fg { height:100%; background:linear-gradient(90deg,#ff4d5e,#ffb400); border-radius:6px; transition:width .2s; }

  #joystickBase { position:absolute; left:30px; bottom:30px; width:110px; height:110px; border-radius:50%;
    background:rgba(255,180,0,.12); border:2px solid rgba(255,180,0,.5); z-index:4; touch-action:none; }
  #joystickKnob { position:absolute; left:50%; top:50%; width:48px; height:48px; margin:-24px 0 0 -24px;
    border-radius:50%; background:rgba(255,209,102,.55); border:2px solid #ffd166; }

  #actionButtons { position:absolute; right:24px; bottom:30px; display:flex; flex-direction:column; gap:14px; z-index:4; align-items:flex-end; }
  .actionBtn { pointer-events:auto; font-family:'Baloo 2',sans-serif; font-weight:800; font-size:14px; color:#1a1035;
    background:linear-gradient(180deg,#ffd166,#ffb400); border:none; padding:12px 20px; border-radius:26px;

  .actionBtn.show { display:block; }
  #sprintBtn { background:linear-gradient(180deg,#8ee3c8,#4fbf9a); box-shadow:0 5px 0 #2c8567; display:block; }
  #sprintBtn:active, #sprintBtn.active { transform:translateY(3px); box-shadow:0 2px 0 #2c8567; }

  .overlay { position:absolute; inset:0; background:radial-gradient(ellipse at center,#241549 0%,#0d0821 80%);
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
    padding:20px; z-index:10; overflow-y:auto; }
  .title { font-family:'Baloo 2',sans-serif; font-weight:800; font-size:clamp(28px,7vw,52px); color:#ffd166;
    text-shadow:0 0 24px rgba(255,180,0,.5),0 4px 0 #7b2cbf; margin:0; }
  .subtitle { color:#8ee3c8; font-weight:700; font-size:13px; letter-spacing:3px; text-transform:uppercase; margin-top:6px; }
  .desc { color:#d9c9f0; max-width:520px; margin:18px 0; line-height:1.6; font-size:14px; }
  .desc b{ color:#ffd166; }
  .startBtn { font-family:'Baloo 2',sans-serif; font-weight:800; font-size:18px; color:#1a1035;
    background:linear-gradient(180deg,#ffd166,#ffb400); border:none; padding:12px 36px; border-radius:28px;
    cursor:pointer; box-shadow:0 6px 0 #b57a00; margin-bottom:10px; }
  .hidden{ display:none !important; }
  #loadingMsg { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    color:#ffd166; font-family:'Baloo 2',sans-serif; font-size:18px; z-index:20; background:#0d0821; }
</style>

<script>

// ---------- IMPROVED DENSE BUILDINGS ----------
const buildingGroup = new THREE.Group();
scene.add(buildingGroup);

function box(w,h,d,color,rough=0.8){ 
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), 
    new THREE.MeshStandardMaterial({color, roughness:rough})); 
  m.castShadow = true; m.receiveShadow = true; 
  return m; 
}

// Random simple building
function createSimpleBuilding() {
  const g = new THREE.Group();
  const width = 3.5 + Math.random() * 4;
  const depth = 3.5 + Math.random() * 4;
  const height = 4 + Math.random() * 7;
  
  const base = box(width, height, depth, 0xaaaaaa + Math.random()*0x333333);
  base.position.y = height/2;
  g.add(base);
  
  // Roof
  const roof = box(width*1.1, 0.8, depth*1.1, 0x555555);
  roof.position.y = height + 0.4;
  g.add(roof);
  
  return g;
}

// Dense Building Placement
function placeDenseBuildings(count = 450) {
  for (let i = 0; i < count; i++) {
    const x = Math.random() * WORLD_W;
    const z = Math.random() * WORLD_H;

    if (!pointInPolygon(x, z, OUTLINE)) continue;
    const h = terrainHeight(x, z);
    if (h <= -5) continue;

    // Road ke paas zyada chance
    let nearRoad = false;
    for (let dx = -15; dx <= 15; dx += 8) {
      for (let dz = -15; dz <= 15; dz += 8) {
        if (Math.abs(terrainHeight(x+dx, z+dz) - h) > 1.8) {
          nearRoad = true; break;
        }
      }
      if (nearRoad) break;
    }

    if (Math.random() > (nearRoad ? 0.72 : 0.25)) continue;

    // Avoid major zones
    let tooClose = false;
    for (let zone of ZONES) {
      if (Math.hypot(zone.x - x, zone.z - z) < 45) { tooClose = true; break; }
    }
    if (tooClose) continue;

    const building = createSimpleBuilding();
    building.position.set(x, h, z);
    building.rotation.y = Math.random() * Math.PI * 2;
    building.scale.setScalar(0.8 + Math.random() * 0.7);
    
    buildingGroup.add(building);
  }
}

// Old zoneGroup wala code bhi rakh sakta hai (POI buildings)

// Call after roads
placeDenseBuildings(420);   // Change number for more/less buildings
